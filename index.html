<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Black Rose Payroll</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: #f0f0f0;
      min-height: 100vh;
    }

    header {
      background: #1a0a0a;
      border-bottom: 2px solid #8b0000;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header h1 {
      font-size: 1.6rem;
      color: #e8000d;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    header span {
      color: #999;
      font-size: 0.9rem;
    }

    .container { padding: 32px; }

    .drop-zone {
      border: 2px dashed #8b0000;
      border-radius: 12px;
      padding: 48px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #1a0a0a;
      margin-bottom: 32px;
    }

    .drop-zone:hover, .drop-zone.drag-over {
      border-color: #e8000d;
      background: #220a0a;
    }

    .drop-zone p { color: #aaa; margin-top: 8px; font-size: 0.9rem; }
    .drop-zone .icon { font-size: 2.5rem; }

    #file-input { display: none; }

    .summary-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .card {
      background: #1a0a0a;
      border: 1px solid #3a0a0a;
      border-radius: 8px;
      padding: 20px;
    }

    .card .name { font-size: 0.85rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
    .card .amount { font-size: 1.6rem; font-weight: bold; color: #e8000d; margin-top: 4px; }
    .card .sub { font-size: 0.8rem; color: #666; margin-top: 4px; }

    .section-title {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #8b0000;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #2a0a0a;
    }

    .filters {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filters input, .filters select {
      background: #1a0a0a;
      border: 1px solid #3a0a0a;
      color: #f0f0f0;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.9rem;
    }

    .filters label { color: #aaa; font-size: 0.85rem; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    thead th {
      background: #1a0a0a;
      padding: 12px 10px;
      text-align: left;
      color: #e8000d;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 2px solid #8b0000;
      white-space: nowrap;
    }

    tbody tr { border-bottom: 1px solid #1f1f1f; }
    tbody tr:hover { background: #1a0a0a; }

    tbody td {
      padding: 10px 10px;
      color: #ddd;
    }

    tbody td.amount { color: #4caf50; font-weight: bold; }
    tbody td.name { color: #fff; font-weight: 600; }

    .tfoot-row td {
      background: #1a0a0a;
      border-top: 2px solid #8b0000;
      padding: 12px 10px;
      font-weight: bold;
      color: #e8000d;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      background: #1a3a1a;
      color: #4caf50;
    }

    .empty {
      text-align: center;
      padding: 60px;
      color: #444;
    }

    .table-wrap { overflow-x: auto; }

    .period-label {
      color: #aaa;
      font-size: 0.85rem;
      margin-bottom: 12px;
    }

    @media (max-width: 600px) {
      .container { padding: 16px; }
      header { padding: 16px; }
      header h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>&#127825; Black Rose</h1>
  <span>Payroll Dashboard</span>
</header>

<div class="container">

  <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
    <div class="icon">📂</div>
    <strong>Drop payroll files here or click to browse</strong>
    <p>Accepts .xlsx files — you can load multiple files at once</p>
    <input type="file" id="file-input" accept=".xlsx" multiple />
  </div>

  <div id="summary-section" style="display:none">
    <p class="section-title">Pay Period Summary</p>
    <p class="period-label" id="period-label"></p>
    <div class="summary-cards" id="summary-cards"></div>

    <p class="section-title">Payroll Detail</p>
    <div class="filters">
      <label>Filter by employee:
        <select id="filter-employee">
          <option value="">All employees</option>
        </select>
      </label>
      <label>Search:
        <input type="text" id="filter-search" placeholder="Customer name, date…" />
      </label>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Employee</th>
            <th>Customer</th>
            <th>Date</th>
            <th>Cash</th>
            <th>Tot Card Charge</th>
            <th>Emp Amt</th>
            <th>Tip</th>
            <th>Swapout</th>
            <th>Total Due</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
        <tfoot id="table-foot"></tfoot>
      </table>
    </div>
  </div>

  <div id="empty-state" class="empty">
    <p>Load your payroll Excel files above to get started.</p>
  </div>

</div>

<script>
  let allRows = [];

  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    handleFiles(e.dataTransfer.files);
  });
  fileInput.addEventListener('change', e => handleFiles(e.target.files));

  function handleFiles(files) {
    const promises = Array.from(files).map(f => readFile(f));
    Promise.all(promises).then(results => {
      allRows = results.flat();
      render();
    });
  }

  function readFile(file) {
    return new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = e => {
        const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
        const rows = [];
        wb.SheetNames.forEach(sheetName => {
          const sheet = wb.Sheets[sheetName];
          const raw = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
          if (raw.length < 2) return;

          // Employee name is in cell A1
          const employeeName = String(raw[0][0] || '').trim();

          // Headers are on row 2 (index 1)
          const headers = raw[1].map(h => String(h).trim().toLowerCase());

          function col(patterns) {
            for (const p of patterns) {
              const i = headers.findIndex(h => h.includes(p.toLowerCase()));
              if (i !== -1) return i;
            }
            return -1;
          }

          const iCustomer = col(['customer', 'client']);
          const iDate     = col(['date']);
          const iCash     = col(['cash']);
          const iCC       = col(['card', 'cc', 'charge']);
          const iEmpAmt   = col(['emp amt', 'emp', 'employee amt', 'employee amount']);
          const iTip      = col(['tip']);
          const iSwapout  = col(['swap']);
          const iTotal    = col(['total']);

          // Data starts at row 3 (index 2)
          for (let i = 2; i < raw.length; i++) {
            const r = raw[i];
            if (r.every(c => c === '')) continue;
            const customerVal = String(iCustomer >= 0 ? r[iCustomer] : '').toLowerCase();
            if (customerVal.includes('total')) continue;
            const numericSum = [iCC, iEmpAmt, iTip, iSwapout, iTotal].filter(x => x >= 0).reduce((s, idx) => s + toNum(r[idx]), 0);
            if (numericSum === 0 && !customerVal) continue;
            rows.push({
              employee: employeeName,
              customer: String(iCustomer >= 0 ? r[iCustomer] : ''),
              date: formatDate(iDate >= 0 ? r[iDate] : ''),
              cash: toNum(iCash >= 0 ? r[iCash] : 0),
              ccCharge: toNum(iCC >= 0 ? r[iCC] : 0),
              empAmt: toNum(iEmpAmt >= 0 ? r[iEmpAmt] : 0),
              tip: toNum(iTip >= 0 ? r[iTip] : 0),
              swapout: toNum(iSwapout >= 0 ? r[iSwapout] : 0),
              total: toNum(iTotal >= 0 ? r[iTotal] : 0),
            });
          }
        });
        resolve(rows);
      };
      reader.readAsArrayBuffer(file);
    });
  }

  function toNum(v) {
    if (v === '' || v === null || v === undefined) return 0;
    const n = parseFloat(String(v).replace(/[^0-9.\-]/g, ''));
    return isNaN(n) ? 0 : n;
  }

  function formatDate(d) {
    if (!d) return '';
    if (d instanceof Date) return d.toLocaleDateString();
    return String(d);
  }

  function fmt(n) {
    return '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  }

  function render() {
    const empFilter = document.getElementById('filter-employee').value;
    const search = document.getElementById('filter-search').value.toLowerCase();

    const filtered = allRows.filter(r => {
      if (empFilter && r.employee !== empFilter) return false;
      if (search && !Object.values(r).join(' ').toLowerCase().includes(search)) return false;
      return true;
    });

    // Summary cards per employee
    const empMap = {};
    allRows.forEach(r => {
      if (!empMap[r.employee]) empMap[r.employee] = { total: 0, rows: 0 };
      empMap[r.employee].total += r.total;
      empMap[r.employee].rows++;
    });

    const cards = document.getElementById('summary-cards');
    cards.innerHTML = '';

    // Total card
    const grandTotal = Object.values(empMap).reduce((s, v) => s + v.total, 0);
    cards.innerHTML += `<div class="card"><div class="name">Grand Total</div><div class="amount">${fmt(grandTotal)}</div><div class="sub">${allRows.length} entries</div></div>`;

    Object.entries(empMap).sort((a,b) => b[1].total - a[1].total).forEach(([name, data]) => {
      cards.innerHTML += `<div class="card"><div class="name">${name}</div><div class="amount">${fmt(data.total)}</div><div class="sub">${data.rows} entries</div></div>`;
    });

    // Employee filter options
    const sel = document.getElementById('filter-employee');
    const prev = sel.value;
    sel.innerHTML = '<option value="">All employees</option>';
    Object.keys(empMap).sort().forEach(name => {
      sel.innerHTML += `<option value="${name}" ${prev===name?'selected':''}>${name}</option>`;
    });

    // Table
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = '';
    filtered.forEach(r => {
      tbody.innerHTML += `<tr>
        <td class="name">${r.employee}</td>
        <td>${r.customer}</td>
        <td>${r.date}</td>
        <td>${fmt(r.cash)}</td>
        <td>${fmt(r.ccCharge)}</td>
        <td>${fmt(r.empAmt)}</td>
        <td>${fmt(r.tip)}</td>
        <td>${fmt(r.swapout)}</td>
        <td class="amount">${fmt(r.total)}</td>
      </tr>`;
    });

    // Footer totals
    const totals = filtered.reduce((acc, r) => {
      acc.cash += r.cash;
      acc.ccCharge += r.ccCharge;
      acc.empAmt += r.empAmt;
      acc.tip += r.tip;
      acc.swapout += r.swapout;
      acc.total += r.total;
      return acc;
    }, { cash: 0, ccCharge: 0, empAmt: 0, tip: 0, swapout: 0, total: 0 });

    document.getElementById('table-foot').innerHTML = `<tr class="tfoot-row">
      <td colspan="3">Totals (${filtered.length} entries)</td>
      <td>${fmt(totals.cash)}</td>
      <td>${fmt(totals.ccCharge)}</td>
      <td>${fmt(totals.empAmt)}</td>
      <td>${fmt(totals.tip)}</td>
      <td>${fmt(totals.swapout)}</td>
      <td>${fmt(totals.total)}</td>
    </tr>`;

    // Period label
    const dates = allRows.map(r => r.date).filter(Boolean);
    document.getElementById('period-label').textContent = dates.length
      ? `Period: ${dates[0]} – ${dates[dates.length - 1]}`
      : '';

    document.getElementById('summary-section').style.display = 'block';
    document.getElementById('empty-state').style.display = 'none';
  }

  document.getElementById('filter-employee').addEventListener('change', render);
  document.getElementById('filter-search').addEventListener('input', render);
</script>
</body>
</html>
